<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindi Calligraphy Designer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Serif+Devanagari:wght@400;700&family=Kalam:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
:root { --accent: #a855f7; }
body { background-color: #111827; color: white; height: 100vh; overflow: hidden; font-family: 'Poppins', sans-serif; }
.canvas-area { background-image: radial-gradient(#374151 1px, transparent 1px); background-size: 20px 20px; }
.layer-selected { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 4px; }
</style>

<!-- 🔥 AdMob Bridge -->
<script>
function showBannerAd(){
  if(window.AndroidAdMob){
    window.AndroidAdMob.showBanner("ca-app-pub-9698100648606421/4117505950");
  }
}
function showInterstitialAd(){
  if(window.AndroidAdMob){
    window.AndroidAdMob.showInterstitial("ca-app-pub-9698100648606421/8249290250");
  }
}
function showRewardedAd(){
  if(window.AndroidAdMob){
    window.AndroidAdMob.showRewarded("ca-app-pub-9698100648606421/2532961546");
  }
}
window.addEventListener("load", ()=>{ showBannerAd(); });
</script>

</head>

<body class="flex flex-col">

<div class="flex flex-1 overflow-hidden">

<aside class="w-80 bg-gray-900 p-4">
<h2 class="text-purple-300 mb-4">Controls</h2>

<input type="color" id="color" class="w-full mb-3">
<input type="range" id="size" min="20" max="200" value="60" class="w-full mb-3">

<input type="file" id="bgUpload" class="w-full mb-3">

<button onclick="showRewardedAd()" class="bg-green-600 w-full py-2 rounded">
Unlock HD (Reward Ad)
</button>

</aside>

<main id="canvas" class="flex-1 relative bg-white"></main>

</div>

<footer class="h-20 bg-gray-900 px-6 flex justify-between items-center">

<button onclick="exportCanvas('png')" class="bg-purple-600 px-4 py-2 rounded">
Export PNG
</button>

<button onclick="exportCanvas('jpg')" class="bg-blue-600 px-4 py-2 rounded">
Export JPG
</button>

</footer>

<script>
let canvas = document.getElementById("canvas");
let layers = [];

function addLayer(){
  let el = document.createElement("div");
  el.contentEditable = true;
  el.innerText = "नमस्ते";
  el.style.position = "absolute";
  el.style.left = "200px";
  el.style.top = "200px";
  el.style.fontSize = "60px";
  el.style.cursor = "move";

  el.onmousedown = function(e){
    let x = e.clientX - el.offsetLeft;
    let y = e.clientY - el.offsetTop;

    document.onmousemove = function(ev){
      el.style.left = (ev.clientX - x)+"px";
      el.style.top = (ev.clientY - y)+"px";
    }
    document.onmouseup = ()=> document.onmousemove=null;
  }

  canvas.appendChild(el);
  layers.push(el);
}

canvas.onclick = addLayer;

document.getElementById("size").oninput = function(){
  layers.forEach(l=> l.style.fontSize = this.value+"px");
}

document.getElementById("color").oninput = function(){
  layers.forEach(l=> l.style.color = this.value);
}

document.getElementById("bgUpload").onchange = function(e){
  let file = e.target.files[0];
  if(file){
    let url = URL.createObjectURL(file);
    canvas.style.backgroundImage = "url("+url+")";
    canvas.style.backgroundSize = "cover";
  }
}

function exportCanvas(type){

  showInterstitialAd(); // 🔥 AdMob Interstitial

  let c = document.createElement("canvas");
  let ctx = c.getContext("2d");

  c.width = canvas.clientWidth;
  c.height = canvas.clientHeight;

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,c.width,c.height);

  layers.forEach(l=>{
    ctx.font = l.style.fontSize+" sans-serif";
    ctx.fillStyle = l.style.color || "#000";
    ctx.fillText(l.innerText, l.offsetLeft, l.offsetTop+50);
  });

  let link = document.createElement("a");
  link.download="design."+type;
  link.href = c.toDataURL("image/"+type);
  link.click();
}

// Auto add first text
addLayer();

</script>

</body>
</html>
