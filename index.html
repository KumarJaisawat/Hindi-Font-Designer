<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindi Font Designer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;background:#111827;color:white;font-family:sans-serif}
.canvas{background:#fff;position:relative;width:100%;height:100%}
.active{outline:2px solid #a855f7}
</style>
</head>

<body class="h-screen flex flex-col">

<!-- TOP -->
<div class="p-3 bg-gray-900 flex justify-between">
<h1>Hindi Font Designer</h1>
<div>
<button onclick="randomBg()" class="bg-blue-600 px-3 py-1 rounded">BG</button>
<button onclick="exportImg()" class="bg-purple-600 px-3 py-1 rounded">Export</button>
</div>
</div>

<!-- MAIN -->
<div class="flex flex-1">

<!-- LEFT -->
<div class="w-60 bg-gray-900 p-3 space-y-3">

<label>Color</label>
<input type="color" id="color">

<label>Size</label>
<input type="range" id="size" min="20" max="120">

<button onclick="addText()" class="bg-purple-600 w-full py-2">Add Text</button>

</div>

<!-- CANVAS -->
<div id="canvas" class="flex-1 canvas"></div>

</div>

<script>

let canvas=document.getElementById("canvas");
let active=null;

// ADD TEXT
function addText(){
let el=document.createElement("div");
el.innerText="नमस्ते";
el.contentEditable=true;

el.style.position="absolute";
el.style.left="100px";
el.style.top="100px";
el.style.fontSize="40px";
el.style.color="#000";

el.onclick=(e)=>{e.stopPropagation();select(el);};

el.onmousedown=(e)=>{
let x=e.clientX-el.offsetLeft;
let y=e.clientY-el.offsetTop;

document.onmousemove=(ev)=>{
el.style.left=(ev.clientX-x)+"px";
el.style.top=(ev.clientY-y)+"px";
};
document.onmouseup=()=>document.onmousemove=null;
};

canvas.appendChild(el);
select(el);
}

// SELECT
function select(el){
document.querySelectorAll(".active").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
active=el;
}

// COLOR
document.getElementById("color").oninput=e=>{
if(active) active.style.color=e.target.value;
};

// SIZE
document.getElementById("size").oninput=e=>{
if(active) active.style.fontSize=e.target.value+"px";
};

// RANDOM BG
function randomBg(){
fetch("https://source.unsplash.com/random/1200x800")
.then(res=>{
canvas.style.backgroundImage=`url(${res.url})`;
canvas.style.backgroundSize="cover";
});
}

// EXPORT
function exportImg(){
let c=document.createElement("canvas");
let ctx=c.getContext("2d");

c.width=canvas.clientWidth;
c.height=canvas.clientHeight;

ctx.fillStyle="#fff";
ctx.fillRect(0,0,c.width,c.height);

let texts=document.querySelectorAll("#canvas div");

texts.forEach(el=>{
ctx.font=el.style.fontSize+" sans-serif";
ctx.fillStyle=el.style.color;
ctx.fillText(el.innerText, el.offsetLeft, el.offsetTop+40);
});

let link=document.createElement("a");
link.download="design.png";
link.href=c.toDataURL();
link.click();
}

// INIT
addText();

</script>

</body>
</html>
