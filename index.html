<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindi Font Designer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

<!-- Google Hindi Typing -->
<script src="https://www.google.com/jsapi"></script>

<link href="https://fonts.googleapis.com/css2?family=Tiro+Hindi&family=Rozha+One&family=Kalam&family=Baloo+2&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif}
.sidebar{width:300px;background:#111827;padding:10px;overflow:auto}
.section{margin-bottom:12px;background:#1f2937;padding:10px;border-radius:10px}
canvas{background:#fff;border-radius:10px}
.topbar{background:#000;padding:10px;display:flex;justify-content:space-between}
button{background:#374151;padding:6px 10px;border-radius:6px}
button:hover{background:#9333ea}
.card{background:#1f2937;padding:6px;border-radius:8px;text-align:center;cursor:pointer}
.card:hover{background:#9333ea}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
</style>
</head>

<body>

<div class="topbar">
<h2>Hindi Font Designer</h2>
<div>
<button onclick="download()">Download</button>
<button onclick="showAd()">Save (Ad)</button>
</div>
</div>

<div style="display:flex;height:calc(100vh - 50px)">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="section">
<h3>Typing</h3>
<textarea id="text" class="w-full p-2 text-black rounded" placeholder="Type here..."></textarea>
<button onclick="addText()" class="w-full mt-2 bg-white text-black">Add Text</button>
</div>

<div class="section">
<h3>Categories</h3>
<div class="grid2">
<div class="card" onclick="style('calli')">Calligraphy</div>
<div class="card" onclick="style('bold')">Bold</div>
<div class="card" onclick="style('hand')">Handwriting</div>
<div class="card" onclick="style('glow')">Glow</div>
<div class="card" onclick="style('poster')">Poster</div>
<div class="card" onclick="style('outline')">Outline</div>
</div>
</div>

<div class="section">
<h3>Colors</h3>
<input type="color" onchange="setColor(this.value)" class="w-full">
<input type="color" onchange="setBgColor(this.value)" class="w-full mt-2">
</div>

<div class="section">
<h3>Effects</h3>
<input type="range" min="0" max="80" oninput="spacing(this.value)">
<input type="range" min="0" max="10" oninput="stroke(this.value)">
<input type="range" min="0" max="20" oninput="shadow(this.value)">
</div>

<div class="section">
<h3>Background</h3>
<div class="grid2">
<img src="https://picsum.photos/200?1" onclick="setBg(this.src)">
<img src="https://picsum.photos/200?2" onclick="setBg(this.src)">
</div>
<input type="file" onchange="uploadBg(event)" class="w-full mt-2">
</div>

</div>

<!-- CANVAS -->
<div style="flex:1;display:flex;justify-content:center;align-items:center">
<canvas id="c" width="600" height="600"></canvas>
</div>

</div>

<!-- Banner Ad -->
<div style="position:fixed;bottom:0;width:100%;text-align:center;background:#000">
<p>Banner Ad (AdMob)</p>
</div>

<script>
let canvas=new fabric.Canvas('c',{backgroundColor:"#fff"});

// Google Hindi Input
google.load("elements", "1", {
packages: "transliteration"
});
function onLoad() {
var options = {
sourceLanguage: 'en',
destinationLanguage: ['hi'],
shortcutKey: 'ctrl+g',
transliterationEnabled: true
};
var control = new google.elements.transliteration.TransliterationControl(options);
control.makeTransliteratable(['text']);
}
google.setOnLoadCallback(onLoad);

// Add Text
function addText(){
let t=new fabric.IText(document.getElementById('text').value||"नमस्ते",{
left:100,top:100,fontSize:60
});
canvas.add(t);canvas.setActiveObject(t);
}

// Styles
function style(t){
let o=canvas.getActiveObject();
if(!o)return;

if(t=="calli") o.set({fontFamily:"Tiro Hindi",charSpacing:30});
if(t=="bold") o.set({fontFamily:"Rozha One",stroke:"black",strokeWidth:2});
if(t=="hand") o.set({fontFamily:"Kalam"});
if(t=="glow") o.set("shadow","rgba(255,255,255,0.8) 0 0 20px");
if(t=="poster") o.set({fontSize:90});
if(t=="outline") o.set({stroke:"black",strokeWidth:3});

canvas.renderAll();
}

// Effects
function setColor(c){let o=canvas.getActiveObject();if(o){o.set("fill",c);canvas.renderAll();}}
function setBgColor(c){canvas.setBackgroundColor(c,canvas.renderAll.bind(canvas));}
function spacing(v){let o=canvas.getActiveObject();if(o){o.set("charSpacing",v*10);canvas.renderAll();}}
function stroke(v){let o=canvas.getActiveObject();if(o){o.set({strokeWidth:v});canvas.renderAll();}}
function shadow(v){let o=canvas.getActiveObject();if(o){o.set("shadow",`rgba(0,0,0,0.5) ${v}px ${v}px ${v*2}px`);canvas.renderAll();}}

// BG
function setBg(url){
fabric.Image.fromURL(url,img=>{
img.scaleToWidth(canvas.width);
canvas.setBackgroundImage(img,canvas.renderAll.bind(canvas));
});
}
function uploadBg(e){
let r=new FileReader();
r.onload=f=>{
fabric.Image.fromURL(f.target.result,img=>{
img.scaleToWidth(canvas.width);
canvas.setBackgroundImage(img,canvas.renderAll.bind(canvas));
});
}
r.readAsDataURL(e.target.files[0]);
}

// Download
function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL({format:"png",multiplier:2});
a.download="design.png";
a.click();
}

// Fake Ad Trigger (App में replace होगा)
function showAd(){
alert("Interstitial Ad Show (AdMob ID use in App)");
download();
}
</script>

</body>
</html>
