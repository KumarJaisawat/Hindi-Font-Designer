<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindi Calligraphy Designer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Serif+Devanagari:wght@400;700&family=Kalam:wght@400;700&family=Poppins:wght@400;700&family=Lobster&display=swap" rel="stylesheet">

<style>
body { background:#111827; color:white; overflow:hidden; }
.canvas-container { height:calc(100vh - 80px); }
.active-layer { outline:2px solid #a855f7; }
</style>

<!-- 🔥 AdMob Bridge -->
<script>
function showBannerAd(){
  if(window.AndroidAdMob){ 
    window.AndroidAdMob.showBanner("ca-app-pub-9698100648606421/4117505950");
  }
}
function showInterstitialAd(){
  if(window.AndroidAdMob){ 
    window.AndroidAdMob.showInterstitial("ca-app-pub-9698100648606421/8249290250");
  }
}
function showRewardedAd(){
  if(window.AndroidAdMob){ 
    window.AndroidAdMob.showRewarded("ca-app-pub-9698100648606421/2532961546");
  }
}
window.onload = function(){
  showBannerAd();
}
</script>

</head>

<body class="flex">

<aside class="w-72 bg-gray-900 p-4">
<h2 class="text-purple-300 mb-4">Controls</h2>

<input type="color" id="color" class="w-full mb-3">

<input type="range" id="size" min="20" max="100" value="40" class="w-full mb-3">

<input type="file" id="bgUpload" class="w-full mb-3">

<button onclick="showRewardedAd()" class="bg-green-600 w-full py-2 rounded">
Unlock HD (Reward Ad)
</button>

</aside>

<main id="canvas" class="flex-1 relative bg-white"></main>

<footer class="fixed bottom-0 w-full bg-black p-3 flex justify-between">
<button onclick="exportImage('png')" class="bg-purple-600 px-4 py-2 rounded">Download PNG</button>
<button onclick="exportImage('jpg')" class="bg-blue-600 px-4 py-2 rounded">Download JPG</button>
</footer>

<script>
let canvas = document.getElementById("canvas");
let layers = [];

function addText(){
  let el = document.createElement("div");
  el.contentEditable = true;
  el.innerText = "नमस्ते";
  el.style.position = "absolute";
  el.style.left = "100px";
  el.style.top = "100px";
  el.style.fontSize = "40px";
  el.style.cursor = "move";

  el.onmousedown = function(e){
    let x = e.clientX - el.offsetLeft;
    let y = e.clientY - el.offsetTop;
    document.onmousemove = function(ev){
      el.style.left = (ev.clientX - x)+"px";
      el.style.top = (ev.clientY - y)+"px";
    }
    document.onmouseup = ()=> document.onmousemove=null;
  }

  canvas.appendChild(el);
  layers.push(el);
}

document.body.onclick = function(e){
  if(e.target.id==="canvas") addText();
}

document.getElementById("size").oninput = function(){
  layers.forEach(l=> l.style.fontSize = this.value+"px");
}

document.getElementById("color").oninput = function(){
  layers.forEach(l=> l.style.color = this.value);
}

document.getElementById("bgUpload").onchange = function(e){
  let file = e.target.files[0];
  if(file){
    let url = URL.createObjectURL(file);
    canvas.style.backgroundImage = "url("+url+")";
    canvas.style.backgroundSize = "cover";
  }
}

function exportImage(type){
  showInterstitialAd(); // 🔥 Ad trigger

  let c = document.createElement("canvas");
  let ctx = c.getContext("2d");

  c.width = canvas.clientWidth;
  c.height = canvas.clientHeight;

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,c.width,c.height);

  layers.forEach(l=>{
    ctx.font = l.style.fontSize+" sans-serif";
    ctx.fillStyle = l.style.color || "#000";
    ctx.fillText(l.innerText, l.offsetLeft, l.offsetTop+40);
  });

  let link = document.createElement("a");
  link.download="design."+type;
  link.href = c.toDataURL("image/"+type);
  link.click();
}
</script>

</body>
</html>
