<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindi Font Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Serif+Devanagari:wght@400;700&family=Kalam:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: white; overflow: hidden; height: 100vh; }
        #canvas-container { background-image: radial-gradient(#374151 1px, transparent 1px); background-size: 20px 20px; }
        .layer-active { outline: 2px solid #8b5cf6; }
        .handle { width: 12px; height: 12px; background: #8b5cf6; border-radius: 50%; position: absolute; }
        /* Ad Banner Style */
        .ad-banner { position: fixed; bottom: 0; left: 0; width: 100%; background: #f3f4f6; color: #6b7280; text-align: center; padding: 5px; font-size: 10px; z-index: 1000; }
    </style>
</head>
<body>

    <div class="flex h-full">
        <aside class="w-72 bg-gray-900 border-r border-purple-500/30 p-4 overflow-y-auto pb-24">
            <h2 class="text-xl font-bold mb-6 text-purple-400">Editor</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Text Content</label>
                    <textarea id="textInput" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white" placeholder="Type in English to transliterate...">नमस्ते</textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Font Family</label>
                    <select id="fontFamily" class="w-full bg-gray-800 border border-gray-700 rounded p-2">
                        <option value="'Noto Serif Devanagari', serif">Noto Serif Hindi</option>
                        <option value="'Noto Sans Devanagari', sans-serif">Noto Sans Hindi</option>
                        <option value="'Kalam', cursive">Kalam (Handwriting)</option>
                        <option value="'Poppins', sans-serif">Poppins</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Text Color</label>
                    <input type="color" id="textColor" value="#7c3aed" class="w-full h-10 rounded">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Font Size</label>
                    <input type="range" id="fontSize" min="10" max="200" value="48" class="w-full">
                </div>

                <button id="addLayer" class="w-full bg-purple-600 hover:bg-purple-700 py-2 rounded font-bold transition">Add New Text</button>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Background Image</label>
                    <input type="file" id="bgUpload" accept="image/*" class="text-xs">
                </div>
            </div>
        </aside>

        <main class="flex-1 relative overflow-hidden" id="canvas-container">
            <div id="artboard" class="absolute bg-white shadow-2xl" style="width: 800px; height: 600px; left: 50%; top: 50%; transform: translate(-50%, -50%);">
                </div>
        </main>
    </div>

    <div class="fixed bottom-10 left-72 right-0 flex justify-center gap-4 p-4 z-50">
        <button onclick="exportImage('png')" class="bg-blue-600 px-6 py-2 rounded-full font-bold shadow-lg">Export PNG</button>
        <button onclick="exportImage('jpg')" class="bg-green-600 px-6 py-2 rounded-full font-bold shadow-lg">Export JPG</button>
    </div>

    <div class="ad-banner">
        Advertisement Space | AdMob: ca-app-pub-9698100648606421/4117505950
    </div>

    <script>
        // Transliteration Engine Logic
        const VOWELS = {'a': 'ा', 'A': 'ा', 'i': 'ि', 'I': 'ी', 'u': 'ु', 'U': 'ू', 'e': 'े', 'ai': 'ै', 'o': 'ो', 'au': 'ौ'};
        const CONSONANTS = {'k': 'क', 'kh': 'ख', 'g': 'ग', 'gh': 'घ', 'ch': 'च', 'chh': 'छ', 'j': 'ज', 'jh': 'झ', 't': 'त', 'th': 'थ', 'd': 'द', 'dh': 'ध', 'n': 'न', 'p': 'प', 'ph': 'फ', 'b': 'ब', 'bh': 'भ', 'm': 'म', 'y': 'य', 'r': 'र', 'l': 'ल', 'v': 'व', 's': 'स', 'h': 'ह'};

        function transliterate(text) {
            let result = '';
            let words = text.split(' ');
            return words.map(word => {
                let out = '';
                for(let i=0; i<word.length; i++) {
                    let char = word[i].toLowerCase();
                    let next = word[i+1] ? word[i+1].toLowerCase() : '';
                    let duo = char + next;
                    if(CONSONANTS[duo]) { out += CONSONANTS[duo]; i++; }
                    else if(CONSONANTS[char]) { out += CONSONANTS[char]; }
                    else if(VOWELS[char]) { out += VOWELS[char]; }
                    else { out += char; }
                }
                return out;
            }).join(' ');
        }

        // Canvas State
        let layers = [];
        let activeLayerId = null;
        const artboard = document.getElementById('artboard');

        function createLayer(text = 'नमस्ते') {
            const id = Date.now();
            const layer = {
                id,
                text,
                x: 100, y: 100,
                fontSize: 48,
                color: '#7c3aed',
                fontFamily: "'Noto Serif Devanagari', serif"
            };
            layers.push(layer);
            render();
        }

        function render() {
            artboard.innerHTML = '';
            layers.forEach(layer => {
                const el = document.createElement('div');
                el.className = `absolute cursor-move select-none ${activeLayerId === layer.id ? 'layer-active' : ''}`;
                el.style.left = layer.x + 'px';
                el.style.top = layer.y + 'px';
                el.style.fontSize = layer.fontSize + 'px';
                el.style.color = layer.color;
                el.style.fontFamily = layer.fontFamily;
                el.innerText = layer.text;
                
                el.onmousedown = (e) => {
                    activeLayerId = layer.id;
                    let startX = e.clientX - layer.x;
                    let startY = e.clientY - layer.y;
                    
                    document.onmousemove = (moveE) => {
                        layer.x = moveE.clientX - startX;
                        layer.y = moveE.clientY - startY;
                        render();
                    };
                    document.onmouseup = () => { document.onmousemove = null; };
                    render();
                };
                artboard.appendChild(el);
            });
        }

        // UI Listeners
        document.getElementById('textInput').oninput = (e) => {
            if(activeLayerId) {
                const layer = layers.find(l => l.id === activeLayerId);
                layer.text = transliterate(e.target.value);
                render();
            }
        };

        document.getElementById('fontSize').oninput = (e) => {
            if(activeLayerId) {
                layers.find(l => l.id === activeLayerId).fontSize = e.target.value;
                render();
            }
        };

        document.getElementById('addLayer').onclick = () => createLayer();

        // Export Logic
        async function exportImage(format) {
            const canvas = document.createElement('canvas');
            canvas.width = 800; canvas.height = 600;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "white";
            ctx.fillRect(0,0,800,600);
            
            layers.forEach(l => {
                ctx.font = `${l.fontSize}px ${l.fontFamily}`;
                ctx.fillStyle = l.color;
                ctx.fillText(l.text, l.x, l.y + parseInt(l.fontSize));
            });

            const link = document.createElement('a');
            link.download = `design.${format}`;
            link.href = canvas.toDataURL(`image/${format}`);
            link.click();
        }

        // Initialize
        createLayer();
    </script>
</body>
</html>
