<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hindi Font Designer Pro</title>
    <!-- Tailwind for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fabric.js for Professional Canvas Manipulation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <!-- Google Fonts for Hindi & English -->
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Teko:wght@300;400;700&family=Rajdhani:wght@300;500;700&family=Rozha+One&family=Yantra+manav:wght@100;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #9d4edd;
            --accent: #00f2ff;
            --bg-dark: #0a0118;
            --panel-bg: rgba(20, 10, 35, 0.95);
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .canvas-container { margin: 0 auto !important; box-shadow: 0 0 30px rgba(157, 78, 221, 0.3); border-radius: 8px; overflow: hidden; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); }
        .neon-border { border: 1px solid var(--primary); box-shadow: 0 0 10px var(--primary); }
        .active-tool { background: var(--primary) !important; color: white !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* AdMob Simulation Placements */
        .ad-banner { height: 50px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #444; }
        
        /* Animations */
        .tap-scale:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <header class="p-4 flex justify-between items-center bg-black/40">
        <h1 class="text-xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">
            HINDI FONT DESIGNER <span class="text-[10px] border border-cyan-400 px-1 rounded">PRO</span>
        </h1>
        <div class="flex gap-3">
            <button onclick="exportImage()" class="bg-cyan-500 text-black px-4 py-1 rounded-full text-sm font-bold tap-scale shadow-[0_0_15px_rgba(0,242,255,0.5)]">SAVE HD</button>
        </div>
    </header>

    <!-- AdMob Top Banner -->
    <div class="ad-banner border-b border-white/5 uppercase tracking-widest">AdMob Banner: ca-app-pub-9698100648606421/4117505950</div>

    <!-- Main Canvas Area -->
    <main class="flex-grow relative flex items-center justify-center p-4">
        <div id="canvas-wrapper" class="relative">
            <canvas id="mainCanvas"></canvas>
        </div>
    </main>

    <!-- Quick Tools (Floating) -->
    <div class="absolute right-4 top-1/3 flex flex-col gap-4">
        <button onclick="document.getElementById('imgInput').click()" class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center border border-white/20 tap-scale">
            🖼️
        </button>
        <button onclick="addText()" class="w-12 h-12 rounded-full bg-purple-600 flex items-center justify-center border border-purple-400 tap-scale shadow-lg">
            T+
        </button>
    </div>

    <!-- Editor Controls Panel -->
    <div class="glass-panel w-full rounded-t-3xl p-4 pb-6">
        
        <!-- Tab Navigation -->
        <div class="flex justify-around mb-4 border-b border-white/10 pb-2 overflow-x-auto">
            <button onclick="showTab('text-tab')" class="tab-btn active-tool px-4 py-1 rounded-full text-sm">TEXT</button>
            <button onclick="showTab('font-tab')" class="tab-btn px-4 py-1 rounded-full text-sm">FONTS</button>
            <button onclick="showTab('style-tab')" class="tab-btn px-4 py-1 rounded-full text-sm">STYLE</button>
            <button onclick="showTab('bg-tab')" class="tab-btn px-4 py-1 rounded-full text-sm">IMAGE</button>
        </div>

        <!-- Transliteration Input -->
        <div id="text-tab" class="tab-content">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-purple-300">Hindi Transliteration</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="transToggle" class="sr-only peer" checked>
                    <div class="w-9 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-purple-600"></div>
                </label>
            </div>
            <textarea id="mainInput" oninput="handleInput(this.value)" placeholder="Type 'Namaste' to get 'नमस्ते'..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-purple-500 h-20"></textarea>
        </div>

        <!-- Font Selector -->
        <div id="font-tab" class="tab-content hidden">
            <div class="grid grid-cols-2 gap-2 h-32 overflow-y-auto">
                <button onclick="changeFont('Teko')" class="p-2 bg-white/5 rounded text-left" style="font-family: 'Teko'">Hindi Bold (Teko)</button>
                <button onclick="changeFont('Kalam')" class="p-2 bg-white/5 rounded text-left" style="font-family: 'Kalam'">Handwriting (Kalam)</button>
                <button onclick="changeFont('Rozha One')" class="p-2 bg-white/5 rounded text-left" style="font-family: 'Rozha One'">Calligraphy (Rozha)</button>
                <button onclick="changeFont('Rajdhani')" class="p-2 bg-white/5 rounded text-left" style="font-family: 'Rajdhani'">Modern Stylish</button>
                <button onclick="changeFont('Arial')" class="p-2 bg-white/5 rounded text-left font-serif">Standard Serif</button>
                <button onclick="changeFont('Yantra manav')" class="p-2 bg-white/5 rounded text-left" style="font-family: 'Yantra manav'">Technical Hindi</button>
            </div>
        </div>

        <!-- Style Engine -->
        <div id="style-tab" class="tab-content hidden">
            <div class="flex flex-wrap gap-3">
                <div class="flex flex-col gap-1">
                    <span class="text-[10px] uppercase text-gray-400">Color</span>
                    <input type="color" onchange="changeColor(this.value)" class="h-10 w-10 bg-transparent border-none">
                </div>
                <div class="flex-grow flex flex-col gap-1">
                    <span class="text-[10px] uppercase text-gray-400">Stroke / Outline</span>
                    <div class="flex gap-2">
                        <button onclick="applyEffect('neon')" class="px-3 py-1 bg-cyan-900 rounded-lg text-xs border border-cyan-400">NEON</button>
                        <button onclick="applyEffect('shadow')" class="px-3 py-1 bg-gray-800 rounded-lg text-xs border border-white/20">SHADOW</button>
                        <button onclick="applyEffect('gradient')" class="px-3 py-1 bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg text-xs">GRADIENT</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Background / Image tools -->
        <div id="bg-tab" class="tab-content hidden">
            <div class="flex gap-4 overflow-x-auto pb-2">
                <div onclick="document.getElementById('imgInput').click()" class="min-w-[80px] h-20 bg-white/5 border-2 border-dashed border-white/20 rounded-lg flex flex-col items-center justify-center cursor-pointer">
                    <span class="text-xl">📷</span>
                    <span class="text-[10px]">Gallery</span>
                </div>
                <div onclick="setCanvasBg('#000')" class="min-w-[80px] h-20 bg-black rounded-lg border border-white/10"></div>
                <div onclick="setCanvasBg('#fff')" class="min-w-[80px] h-20 bg-white rounded-lg border border-white/10"></div>
                <div onclick="setCanvasBg('https://images.unsplash.com/photo-1579546678183-a84ee14400c4?w=400')" class="min-w-[80px] h-20 bg-cover bg-center rounded-lg" style="background-image: url('https://images.unsplash.com/photo-1579546678183-a84ee14400c4?w=400')"></div>
            </div>
        </div>
    </div>

    <!-- Hidden Inputs -->
    <input type="file" id="imgInput" accept="image/*" class="hidden">

    <!-- Audio for Feedback -->
    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        // --- TRANSLITERATION MAPPING ENGINE ---
        const translitMap = {
            'a': 'अ', 'aa': 'आ', 'i': 'इ', 'ee': 'ई', 'u': 'उ', 'oo': 'ऊ', 'e': 'ए', 'ai': 'ऐ', 'o': 'ओ', 'au': 'औ', 'an': 'अं', 'ah': 'अः',
            'ka': 'क', 'kha': 'ख', 'ga': 'ग', 'gha': 'घ', 'cha': 'च', 'chha': 'छ', 'ja': 'ज', 'jha': 'झ', 'ta': 'त', 'tha': 'थ', 'da': 'द', 'dha': 'ध', 'na': 'न',
            'pa': 'प', 'pha': 'फ', 'ba': 'ब', 'bha': 'भ', 'ma': 'म', 'ya': 'य', 'ra': 'र', 'la': 'ल', 'va': 'व', 'sha': 'श', 'sa': 'स', 'ha': 'ह',
            'namaste': 'नमस्ते', 'mera': 'मेरा', 'naam': 'नाम', 'kaise': 'कैसे', 'ho': 'हो'
        };

        function transliterate(text) {
            let lower = text.toLowerCase();
            // Basic Logic for demo - Production would use a more complex library like Sanscript
            for (let key in translitMap) {
                let regex = new RegExp(key, 'g');
                lower = lower.replace(regex, translitMap[key]);
            }
            return lower;
        }

        // --- CANVAS CORE ENGINE ---
        let canvas;
        const canvasSize = Math.min(window.innerWidth - 40, 400);

        window.onload = () => {
            canvas = new fabric.Canvas('mainCanvas', {
                width: canvasSize,
                height: canvasSize,
                backgroundColor: '#111'
            });
            
            // Add initial text
            addText("नमस्ते");
            
            // Handle image uploads
            document.getElementById('imgInput').onchange = function(e) {
                let reader = new FileReader();
                reader.onload = function(event) {
                    let imgObj = new Image();
                    imgObj.src = event.target.result;
                    imgObj.onload = function() {
                        let image = new fabric.Image(imgObj);
                        image.scaleToWidth(canvasSize);
                        canvas.setBackgroundImage(image, canvas.renderAll.bind(canvas));
                    }
                }
                reader.readAsDataURL(e.target.files[0]);
            };

            // Custom Controls Style
            fabric.Object.prototype.set({
                transparentCorners: false,
                cornerColor: '#00f2ff',
                cornerStrokeColor: '#00f2ff',
                borderColor: '#9d4edd',
                cornerSize: 10,
                padding: 10
            });
        };

        function addText(val = "नया टेक्स्ट") {
            const text = new fabric.IText(val, {
                left: 50,
                top: 50,
                fontFamily: 'Teko',
                fill: '#ffffff',
                fontSize: 40
            });
            canvas.add(text);
            canvas.setActiveObject(text);
            playSound();
        }

        function handleInput(val) {
            const active = canvas.getActiveObject();
            if (active && active.type === 'i-text') {
                const isTransOn = document.getElementById('transToggle').checked;
                active.set('text', isTransOn ? transliterate(val) : val);
                canvas.renderAll();
            }
        }

        function changeFont(font) {
            const active = canvas.getActiveObject();
            if (active) {
                active.set('fontFamily', font);
                canvas.renderAll();
            }
        }

        function changeColor(color) {
            const active = canvas.getActiveObject();
            if (active) {
                active.set('fill', color);
                canvas.renderAll();
            }
        }

        function applyEffect(type) {
            const active = canvas.getActiveObject();
            if (!active) return;

            if (type === 'neon') {
                active.set({
                    shadow: new fabric.Shadow({
                        color: active.fill || '#00f2ff',
                        blur: 20,
                        offsetX: 0,
                        offsetY: 0
                    })
                });
            } else if (type === 'shadow') {
                active.set({
                    shadow: new fabric.Shadow({
                        color: 'rgba(0,0,0,0.8)',
                        blur: 10,
                        offsetX: 5,
                        offsetY: 5
                    })
                });
            }
            canvas.renderAll();
        }

        function setCanvasBg(source) {
            if (source.startsWith('#')) {
                canvas.setBackgroundImage(null);
                canvas.setBackgroundColor(source, canvas.renderAll.bind(canvas));
            } else {
                fabric.Image.fromURL(source, function(img) {
                    img.scaleToWidth(canvasSize);
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                }, { crossOrigin: 'anonymous' });
            }
        }

        // --- UI LOGIC ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tool'));
            document.getElementById(tabId).classList.remove('hidden');
            event.currentTarget.classList.add('active-tool');
        }

        function playSound() {
            const snd = document.getElementById('clickSound');
            snd.currentTime = 0;
            snd.play().catch(e => {});
        }

        function exportImage() {
            // AdMob Interstitial Simulation
            alert("Showing Interstitial Ad (ca-app-pub-9698100648606421/8249290250)...");
            
            setTimeout(() => {
                const dataURL = canvas.toDataURL({
                    format: 'png',
                    quality: 1.0,
                    multiplier: 2 // HD Export
                });
                const link = document.createElement('a');
                link.download = 'HindiDesign_Pro.png';
                link.href = dataURL;
                link.click();
            }, 1000);
        }

        // Auto-update input field when selecting text on canvas
        canvas.on('selection:created', (e) => {
            if (e.selected[0].type === 'i-text') {
                document.getElementById('mainInput').value = e.selected[0].text;
            }
        });
    </script>
</body>
</html>
